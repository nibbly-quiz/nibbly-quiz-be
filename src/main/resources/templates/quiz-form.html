<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>퀴즈 등록</title>
    <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 2rem;
            max-width: 800px;
            margin: auto;
            background-color: #f9f9f9;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        input[type="text"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.3rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .options-container {
            margin-top: 1rem;
            background: #fff;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .option-item {
            margin-bottom: 1.2rem;
            padding: 0.8rem;
            border: 1px solid #e1e1e1;
            border-radius: 6px;
            background-color: #fefefe;
        }

        .option-main {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .option-main input[type="text"] {
            flex-grow: 1;
        }

        .checkbox-inline {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
        }

        .option-correction-block {
            display: flex;
            align-items: flex-start;
            margin-top: 0.6rem;
            margin-left: 1.5rem;
        }

        .option-correction-block .arrow {
            margin-right: 0.5rem;
            font-weight: bold;
            color: #888;
        }

        .option-correction {
            flex-grow: 1;
            background-color: #f2f2f2;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 0.4rem 0.6rem;
            font-size: 0.9rem;
        }

        .add-option,
        .remove-option {
            background: #007BFF;
            color: white;
            border: none;
            padding: 0.3rem 0.6rem;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .remove-option {
            background: #dc3545;
        }

        .add-option:hover {
            background: #0056b3;
        }

        .remove-option:hover {
            background: #c82333;
        }

        button.submit {
            background: #28a745;
            color: white;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: block;
            margin-top: 2rem;
            width: 100%;
        }

        button.submit:hover {
            background: #218838;
        }
    </style>
</head>
<body>

<h1>퀴즈 등록</h1>

<div class="form-group">
    <label for="title">문제 내용</label>
    <textarea id="title" rows="4" required></textarea>
</div>

<div class="form-group">
    <label for="scheduledAt">출제 날짜</label>
    <input type="date" id="scheduledAt" required/>
</div>

<div class="form-group options-container">
    <label>선지</label>
    <div id="options-wrapper">
        <div class="option-item">
            <div class="option-main">
                <input type="text" class="option-content" placeholder="선지 내용" required/>
                <label class="checkbox-inline">
                    <input type="checkbox" class="option-answer"/>
                    정답
                </label>
                <button type="button" class="remove-option" onclick="removeOption(this)">–</button>
            </div>
            <div class="option-correction-block">
                <div class="arrow">ㄴ</div>
                <input type="text" class="option-correction" placeholder="해설 (오답일 경우 필수)"/>
            </div>
        </div>
    </div>
    <button type="button" class="add-option" onclick="addOption()">+ 선지 추가</button>
</div>

<div class="form-group">
    <label for="commentary-editor">문제 해설 <small style="color:#777">(Markdown 지원 + 미리보기)</small></label>
    <div id="commentary-editor"></div>
</div>

<button type="button" class="submit" onclick="submitQuiz()">등록하기</button>

<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script>
    const editor = new toastui.Editor({
        el: document.querySelector('#commentary-editor'),
        height: '300px',
        initialEditType: 'markdown',
        previewStyle: 'vertical'
    });

    function addOption() {
        const wrapper = document.getElementById("options-wrapper");

        const div = document.createElement("div");
        div.className = "option-item";

        div.innerHTML = `
            <div class="option-main">
                <input type="text" class="option-content" placeholder="선지 내용" required/>
                <label class="checkbox-inline">
                    <input type="checkbox" class="option-answer" />
                    정답
                </label>
                <button type="button" class="remove-option" onclick="removeOption(this)">–</button>
            </div>
            <div class="option-correction-block">
                <div class="arrow">ㄴ</div>
                <input type="text" class="option-correction" placeholder="해설 (오답일 경우 필수)"/>
            </div>
        `;
        wrapper.appendChild(div);
    }

    function removeOption(button) {
        const wrapper = document.getElementById("options-wrapper");
        if (wrapper.childElementCount > 1) {
            wrapper.removeChild(button.closest(".option-item"));
        }
    }

    function submitQuiz() {
        const title = document.getElementById("title").value;
        const scheduledAt = document.getElementById("scheduledAt").value;
        const commentary = editor.getMarkdown();

        const optionElements = document.querySelectorAll("#options-wrapper .option-item");

        const optionCreateRequests = Array.from(optionElements).map(item => {
            const content = item.querySelector(".option-content").value;
            const isAnswer = item.querySelector(".option-answer").checked;
            const correction = item.querySelector(".option-correction").value || null;

            return {
                content,
                correction,
                isAnswer
            };
        });

        const payload = {
            title,
            scheduledAt,
            commentary,
            optionCreateRequests
        };

        console.log("전송될 JSON:", JSON.stringify(payload, null, 2));

        fetch("/quizzes", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        })
            .then(res => {
                if (res.ok) {
                    alert("퀴즈가 등록되었습니다!");
                    window.location.href = "/";
                } else {
                    return res.json().then(err => {
                        alert(err.message || "서버 오류");
                    });
                }
            })
            .catch(err => {
                console.error("요청 실패", err);
                alert("요청 중 오류가 발생했습니다.");
            });
    }
</script>

</body>
</html>
