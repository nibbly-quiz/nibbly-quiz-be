<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nibbly Quiz - 홈</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #343a40;
        }

        .nav {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 300px;
        }

        .nav a {
            display: block;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1rem;
            border-radius: 5px;
            text-align: center;
            transition: background-color 0.2s ease-in-out;
        }

        .nav a:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<h1>🧠 Nibbly Quiz</h1>
<p>CS 지식을 퀴즈로 풀어보세요!</p>

<div class="nav">
    <a th:href="@{/quiz/new}">퀴즈 등록하기</a>
    <a th:href="@{/quiz/today}">오늘의 퀴즈 풀기</a>
    <a th:href="@{/quiz/history}">지난 퀴즈 보기</a>
</div>

</body>
</html>
